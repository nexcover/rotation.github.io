<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.Davicon.png">
    <script src="JS/style.js" defer></script>
    <title>교대근무 표</title>
</head>

<body>
    <h1>교대근무 표</h1>
    <div id="monthControls">
        <button id="prevMonth">이전 달</button>
        <span id="currentMonthDisplay"></span>
        <button id="nextMonth">다음 달</button>
    </div>
    <table id="scheduleTable">
        <thead>
            <tr>
                <th>일</th>
                <th>월</th>
                <th>화</th>
                <th>수</th>
                <th>목</th>
                <th>금</th>
                <th>토</th>
            </tr>
        </thead>
        <tbody id="calendarBody">
        </tbody>
    </table>
</body>

</html>
